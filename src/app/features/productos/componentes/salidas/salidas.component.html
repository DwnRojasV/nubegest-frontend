<div class="content-wrapper">
  <!-- Encabezado -->
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-2">
        <div class="col-sm-6">
          <h1>Salidas de Inventario</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="/dashboard">Inicio</a></li>
            <li class="breadcrumb-item active">Salidas</li>
          </ol>
        </div>
      </div>
    </div>
  </section>

  <!-- Contenido principal -->
  <section class="content">
    <div class="card">
      <div class="card-header bg-danger">
        <h3 class="card-title text-white">Registrar nueva salida</h3>
      </div>
      <div class="card-body">
        <form>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="productoSalida">Producto</label>
              <input type="text" id="productoSalida" class="form-control" placeholder="Nombre del producto">
            </div>
            <div class="col-md-2 mb-3">
              <label for="cantidadSalida">Cantidad</label>
              <input type="number" id="cantidadSalida" class="form-control" placeholder="Ej: 5">
            </div>
            <div class="col-md-3 mb-3">
              <label for="fechaSalida">Fecha de Salida</label>
              <input type="date" id="fechaSalida" class="form-control">
            </div>
            <div class="col-md-3 mb-3">
              <label for="destinoSalida">Destino</label>
              <input type="text" id="destinoSalida" class="form-control" placeholder="Departamento o responsable">
            </div>
          </div>
          <button type="submit" class="btn btn-danger mt-2">Guardar Salida</button>
        </form>
      </div>
    </div>

    <!-- Tabla de salidas registradas -->
    <div class="card mt-4">
      <div class="card-header bg-secondary">
        <h3 class="card-title text-white">Historial de Salidas</h3>
      </div>
      <div class="card-body">
        <table class="table table-bordered table-striped">
          <thead>
            <tr>
              <th>ID</th>
              <th>Producto</th>
              <th>Cantidad</th>
              <th>Fecha</th>
              <th>Destino</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <!-- Ejemplos de registros -->
            <tr>
              <td>1</td>
              <td>Laptop Dell</td>
              <td>3</td>
              <td>2025-06-18</td>
              <td>Oficina Principal</td>
              <td>
                <button class="btn btn-sm btn-warning mr-1"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-danger"><i class="fas fa-trash-alt"></i></button>
              </td>
            </tr>
            <tr>
              <td>2</td>
              <td>Monitor LG</td>
              <td>2</td>
              <td>2025-06-17</td>
              <td>Sucursal Norte</td>
              <td>
                <button class="btn btn-sm btn-warning mr-1"><i class="fas fa-edit"></i></button>
                <button class="btn btn-sm btn-danger"><i class="fas fa-trash-alt"></i></button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>
</div>
