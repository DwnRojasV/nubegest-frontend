<!-- Content Wrapper. Contains page content -->
<div class="content-wrapper">
  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Orden de Compra</h3>

        <div class="card-tools">
          <button type="button" class="btn btn-tool" data-card-widget="collapse" title="Collapse">
            <i class="fas fa-minus"></i>
          </button>
          <button type="button" class="btn btn-tool" data-card-widget="remove" title="Remove">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
      <div class="card-body">
        <!-- Encabezado de la orden de compra -->
        <form>
          <div class="row">
            <div class="col-md-6">
              <!-- Proveedor -->
              <div class="form-group">
                <label for="supplier">Proveedor</label>
                <select id="supplier" class="form-control form-control-sm">
                  <option>Seleccione un proveedor</option>
                  <!-- Aquí van los proveedores cargados dinámicamente -->
                </select>
              </div>
            </div>

            <div class="col-md-3">
              <!-- Fecha de la orden -->
              <div class="form-group">
                <label for="orderDate">Fecha</label>
                <input type="date" id="orderDate" class="form-control form-control-sm" />
              </div>
            </div>

            <div class="col-md-3">
              <!-- Número de orden (opcional) -->
              <div class="form-group">
                <label for="orderNumber">Número de Orden</label>
                <input type="text" id="orderNumber" class="form-control form-control-sm" placeholder="Número de orden" />
              </div>
            </div>
          </div>
        </form>

        <!-- Tabla de detalles de la orden de compra -->
        <h4>Detalles de Productos</h4>
        <table class="table table-bordered table-striped table-sm">
          <thead>
            <tr>
              <th>Producto</th>
              <th>Cantidad</th>
              <th>Precio Unitario</th>
              <th>Subtotal</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <!-- Detalle de producto 1 -->
            <tr>
              <td>
                <select class="form-control form-control-sm">
                  <option>Seleccione un producto</option>
                  <!-- Aquí van los productos cargados dinámicamente -->
                </select>
              </td>
              <td>
                <input type="number" class="form-control form-control-sm" placeholder="Cantidad" />
              </td>
              <td>
                <input type="number" class="form-control form-control-sm" placeholder="Precio unitario" />
              </td>
              <td>
                <!-- Calculado automáticamente al cambiar cantidad o precio -->
                <input type="text" class="form-control form-control-sm" placeholder="Subtotal" readonly />
              </td>
              <td>
                <button type="button" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
            <!-- Agregar más productos de la misma forma -->
          </tbody>
        </table>

        <!-- Botón para agregar más filas de detalles -->
        <button type="button" class="btn btn-primary btn-sm mt-3"><i class="fas fa-plus"></i> Agregar Producto</button>
      </div>

      <!-- /.card-body -->
      <div class="card-footer">
        <!-- Botones de acción -->
        <div class="row">
          <div class="col-md-12 text-right">
            <button type="submit" class="btn btn-success mr-2">
              <i class="fas fa-save"></i> Guardar Orden
            </button>
            
            <a [routerLink]="['/purchases/purchase-orders']" class="btn btn-warning">
              <i class="fas fa-times"></i> Cancelar
            </a>
          </div>
        </div>
      </div>
      <!-- /.card-footer-->
    </div>
    <!-- /.card -->
  </section>
  <!-- /.content -->
</div>
<!-- /.content-wrapper -->
