<div class="content-wrapper">
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-0">
        <div class="col-sm-6">
          <h1>Listado de Marcas</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="#">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="#">Marcas</a></li>
            <li class="breadcrumb-item active">Listado</li>
          </ol>
        </div>
      </div>
    </div>
  </section>

  <section class="content">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Listado de Marcas</h3>
        <div class="card-tools">
          <button type="button" class="btn btn-tool" data-card-widget="collapse" title="Collapse">
            <i class="fas fa-minus"></i>
          </button>
          <button type="button" class="btn btn-tool" data-card-widget="remove" title="Remove">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div class="card-body">
        <!-- Botón para agregar una nueva marca -->
        <div class="mb-3">
          <a href="/parameters/brands/create" class="btn btn-primary btn-sm">
            <i class="fas fa-plus"></i> Nuevo Registro
          </a>
        </div>

        <!-- Tabla de ngx-datatable -->
        <ngx-datatable tableClass="table table-striped table-bordered table-hover"  
        [tableId]="'basic1'" [data]="brands" [options]="optionsWithCaption"
        [columns]="columns" >
        <ngx-caption>
          <div class="row">
            <div class="col-sm-12 col-xs-12 col-12 ">
              <b>
                <i class="fa fa-table" aria-hidden="true"></i>
                Basic Data Table List
              </b>
            </div>
          </div>
        </ngx-caption>
      </ngx-datatable>
      </div>

      <div class="card-footer">
        Listado de todas las marcas disponibles.
      </div>
    </div>
  </section>
</div>
