<!-- Content Wrapper. Contains page content -->
<div class="content-wrapper">
  <!-- Content Header (Page header) -->
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-0">
        <div class="col-sm-6">
          <h1>Listado de Marcas</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="#">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="#">Marcas</a></li>
            <li class="breadcrumb-item active">Listado</li>
          </ol>
        </div>
      </div>
    </div><!-- /.container-fluid -->
  </section>

  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Listado de Marcas</h3>

        <div class="card-tools">
          <button type="button" class="btn btn-tool" data-card-widget="collapse" title="Collapse">
            <i class="fas fa-minus"></i>
          </button>
          <button type="button" class="btn btn-tool" data-card-widget="remove" title="Remove">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div class="card-body">
        <!-- Botón para agregar una nueva marca -->
        <div class="mb-3">
          <a href="/parameters/brands/create" class="btn btn-primary btn-sm">
            <i class="fas fa-plus"></i> Nuevo Registro
          </a>
        </div>

        <!-- Tabla de listado de marcas -->
        <table class="table table-bordered table-striped table-sm">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Activo</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <!-- Ejemplo de registro 1 -->
            <tr>
              <td>1</td>
              <td>Marca A</td>
              <td>Sí</td>
              <td class="text-right">
                <a href="/parameters/brands/show/1" class="btn btn-info btn-sm mr-1"><i class="fas fa-eye"></i> Mostrar</a>
                <a href="/parameters/brands/edit/1" class="btn btn-warning btn-sm mr-1"><i class="fas fa-edit"></i> Editar</a>
                <a href="/parameters/brands/delete/1" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i> Eliminar</a>
              </td>
            </tr>

            <!-- Ejemplo de registro 2 -->
            <tr>
              <td>2</td>
              <td>Marca B</td>
              <td>No</td>
              <td class="text-right">
                <a href="/parameters/brands/show/2" class="btn btn-info btn-sm mr-1"><i class="fas fa-eye"></i> Mostrar</a>
                <a href="/parameters/brands/edit/2" class="btn btn-warning btn-sm mr-1"><i class="fas fa-edit"></i> Editar</a>
                <a href="/parameters/brands/delete/2" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i> Eliminar</a>
              </td>
            </tr>

            <!-- Más registros aquí -->
          </tbody>
        </table>
      </div>

      <!-- /.card-body -->
      <div class="card-footer">
        Listado de todas las marcas disponibles.
      </div>
      <!-- /.card-footer-->
    </div>
    <!-- /.card -->
  </section>
  <!-- /.content -->
</div>
<!-- /.content-wrapper -->
