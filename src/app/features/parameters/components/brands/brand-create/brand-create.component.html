<!-- Content Wrapper. Contains page content -->
<div class="content-wrapper">
  <!-- Content Header (Page header) -->
  <section class="content-header">
    <div class="container-fluid">
      <div class="row mb-0">
        <div class="col-sm-6">
          <h1>Nuevo Registro de Marca</h1>
        </div>
        <div class="col-sm-6">
          <ol class="breadcrumb float-sm-right">
            <li class="breadcrumb-item"><a href="#">Dashboard</a></li>
            <li class="breadcrumb-item"><a href="#">Marcas</a></li>
            <li class="breadcrumb-item active">Nuevo Registro</li>
          </ol>
        </div>
      </div>
    </div><!-- /.container-fluid -->
  </section>

  <!-- Main content -->
  <section class="content">
    <!-- Default box -->
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Formulario de Nuevo Registro</h3>

        <div class="card-tools">
          <button type="button" class="btn btn-tool" data-card-widget="collapse" title="Collapse">
            <i class="fas fa-minus"></i>
          </button>
          <button type="button" class="btn btn-tool" data-card-widget="remove" title="Remove">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div class="card-body">
        <!-- Formulario de nuevo registro de marca -->
        <form>
          <div class="row">
            <div class="col-md-6">
              <!-- Nombre de la Marca -->
              <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" class="form-control" required />
              </div>
              <!-- Activo -->
              <div class="form-group">
                <label for="active">Activo</label>
                <select id="active" name="active" class="form-control">
                  <option value="true">Sí</option>
                  <option value="false">No</option>
                </select>
              </div>
            </div>

            <div class="col-md-6">
              <!-- Descripción de la Marca -->
              <div class="form-group">
                <label for="description">Descripción</label>
                <textarea id="description" name="description" class="form-control" rows="5" required></textarea>
              </div>
            </div>
          </div>

        </form>
      </div>

      <!-- /.card-body -->
      <div class="card-footer">
        <!-- Botones de acción -->
        <div class="row">
          <div class="col-md-12 text-right">
            <!-- <button type="submit" class="btn btn-success mr-2">
              <i class="fas fa-save"></i> Guardar
            </button> -->
            <a [routerLink]="['/parameters/brands']" class="btn btn-app">
              <i class="fas fa-save"></i> Guardar
            </a>
            <a [routerLink]="['/parameters/brands']" class="btn btn-app">
              <i class="fas fa-times"></i> Cancelar
            </a>
          </div>
        </div>
      </div>
      <!-- /.card-footer--> 
    </div>
    <!-- /.card -->
  </section>
  <!-- /.content -->
</div>
<!-- /.content-wrapper -->
